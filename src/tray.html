<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docksy Quick Menu</title>
  <style>
    :root {
      --bg-base: #111113;
      --border-color: #222226;
      --text-main: #e4e4e7;
      --text-muted: #71717a;
      --accent-color: #1f62ff;
      --accent-hover: #0048eb;
      --hover-bg: #1e1e24;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .btn-snapshot {
      background: var(--accent-color);
      color: #ffffff;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s ease;
    }

    .btn-snapshot:hover {
      background: var(--accent-hover);
    }

    .btn-snapshot:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* List Area */
    .menu-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 6px 0;
    }

    .section-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 6px 12px 4px 12px;
    }

    /* Simple row items */
    .menu-item {
      padding: 8px 12px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      color: var(--text-main);
      transition: background 0.1s ease;
    }

    .menu-item:hover {
      background: var(--hover-bg);
    }

    .item-meta {
      font-size: 10px;
      color: var(--text-muted);
    }

    .empty-state {
      padding: 12px 12px;
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .footer-item {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .footer-item:hover {
      background: var(--hover-bg);
      color: var(--text-main);
    }

    /* Spinner */
    .spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">Docksy Restorer</span>
    <button class="btn-snapshot" id="btn-snapshot">Capture Layout</button>
  </div>

  <div class="menu-area">
    <div class="section-title">Favorite Workspaces</div>
    <div id="workspace-list">
      <!-- Loaded dynamically (Top 5) -->
    </div>

    <div class="section-title">Latest Snapshot</div>
    <div id="latest-snapshot">
      <!-- Loaded dynamically (Top 1) -->
    </div>
  </div>

  <div class="footer">
    <div class="footer-item" id="btn-open-app">Open Dashboard</div>
    <div class="footer-item" id="btn-quit">Quit Docksy</div>
  </div>

  <script>
    const BACKEND_URL = 'http://127.0.0.1:19082';

    const workspaceList = document.getElementById('workspace-list');
    const latestSnapshotContainer = document.getElementById('latest-snapshot');
    const btnSnapshot = document.getElementById('btn-snapshot');
    const btnOpenApp = document.getElementById('btn-open-app');
    const btnQuit = document.getElementById('btn-quit');

    // Load workspaces and latest snapshot
    async function loadMenuData() {
      try {
        // 1. Fetch workspaces
        const resWorkspaces = await fetch(`${BACKEND_URL}/api/workspaces`);
        if (resWorkspaces.ok) {
          const workspaces = await resWorkspaces.json();
          const favorites = workspaces.filter(w => w.favorite === 1).slice(0, 5);
          
          workspaceList.innerHTML = '';
          if (favorites.length === 0) {
            workspaceList.innerHTML = '<div class="empty-state">No favorite workspaces</div>';
          } else {
            favorites.forEach(w => {
              const item = document.createElement('div');
              item.className = 'menu-item';
              item.innerHTML = `
                <span>${w.name}</span>
                <span class="item-meta" id="status-${w.id}">Click to Restore</span>
              `;
              item.addEventListener('click', () => restoreWorkspace(w.id, w.name));
              workspaceList.appendChild(item);
            });
          }
        }

        // 2. Fetch latest snapshot
        const resSnapshots = await fetch(`${BACKEND_URL}/api/snapshots`);
        if (resSnapshots.ok) {
          const snapshots = await resSnapshots.json();
          latestSnapshotContainer.innerHTML = '';
          
          if (snapshots.length === 0) {
            latestSnapshotContainer.innerHTML = '<div class="empty-state">No snapshots taken</div>';
          } else {
            // Sort snapshots by ID descending to get the newest
            const sorted = snapshots.sort((a, b) => b.id - a.id);
            const latest = sorted[0];
            
            const item = document.createElement('div');
            item.className = 'menu-item';
            
            // Format timestamp for display (extract time part or date)
            const timeString = latest.timestamp ? latest.timestamp.split(' ')[1] || latest.timestamp : 'Recent';
            
            item.innerHTML = `
              <span>${latest.name} (${timeString})</span>
              <span class="item-meta" id="snap-status-${latest.id}">Restore</span>
            `;
            item.addEventListener('click', () => restoreSnapshot(latest.id, latest.name));
            latestSnapshotContainer.appendChild(item);
          }
        }
      } catch (e) {
        workspaceList.innerHTML = '<div class="empty-state">Connection failed</div>';
        latestSnapshotContainer.innerHTML = '<div class="empty-state">Connection failed</div>';
      }
    }

    // Restore workspace action
    async function restoreWorkspace(id, name) {
      const meta = document.getElementById(`status-${id}`);
      if (!meta || meta.disabled) return;
      
      meta.disabled = true;
      meta.innerHTML = '<div class="spinner"></div>';
      
      try {
        const res = await fetch(`${BACKEND_URL}/api/workspaces/restore`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        if (res.ok) {
          meta.textContent = 'Restored!';
          setTimeout(() => { meta.textContent = 'Click to Restore'; meta.disabled = false; }, 2000);
        } else {
          meta.textContent = 'Error';
          setTimeout(() => { meta.textContent = 'Click to Restore'; meta.disabled = false; }, 2000);
        }
      } catch (e) {
        meta.textContent = 'Error';
        setTimeout(() => { meta.textContent = 'Click to Restore'; meta.disabled = false; }, 2000);
      }
    }

    // Restore snapshot action
    async function restoreSnapshot(id, name) {
      const meta = document.getElementById(`snap-status-${id}`);
      if (!meta || meta.disabled) return;
      
      meta.disabled = true;
      meta.innerHTML = '<div class="spinner"></div>';
      
      try {
        const res = await fetch(`${BACKEND_URL}/api/snapshots/restore`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        if (res.ok) {
          meta.textContent = 'Restored!';
          setTimeout(() => { meta.textContent = 'Restore'; meta.disabled = false; }, 2000);
        } else {
          meta.textContent = 'Error';
          setTimeout(() => { meta.textContent = 'Restore'; meta.disabled = false; }, 2000);
        }
      } catch (e) {
        meta.textContent = 'Error';
        setTimeout(() => { meta.textContent = 'Restore'; meta.disabled = false; }, 2000);
      }
    }

    // Capture Snapshot action
    btnSnapshot.addEventListener('click', async () => {
      if (btnSnapshot.disabled) return;
      btnSnapshot.disabled = true;
      const originalText = btnSnapshot.textContent;
      btnSnapshot.textContent = 'Capturing...';
      
      try {
        const res = await fetch(`${BACKEND_URL}/api/snapshots/capture`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: 'Quick Snapshot' })
        });
        if (res.ok) {
          btnSnapshot.textContent = 'Done!';
          loadMenuData(); // refresh list
          setTimeout(() => { btnSnapshot.textContent = originalText; btnSnapshot.disabled = false; }, 2000);
        } else {
          btnSnapshot.textContent = 'Failed';
          setTimeout(() => { btnSnapshot.textContent = originalText; btnSnapshot.disabled = false; }, 2000);
        }
      } catch (e) {
        btnSnapshot.textContent = 'Failed';
        setTimeout(() => { btnSnapshot.textContent = originalText; btnSnapshot.disabled = false; }, 2000);
      }
    });

    // Electron integration
    btnOpenApp.addEventListener('click', () => {
      window.docksyAPI.openMainWindow();
    });

    btnQuit.addEventListener('click', () => {
      window.docksyAPI.quitApp();
    });

    // Refresh on focus
    window.addEventListener('focus', loadMenuData);

    // Initial load
    loadMenuData();
  </script>
</body>
</html>
